map $sent_http_content_type $rm_iore_expires {
    default   off;
    text/html epoch;
}

server {
    listen 127.0.0.1:2789 default_server;
    server_name rm.iore.tv;

    access_log off;
    server_tokens off;
    client_max_body_size 1m;
    expires $rm_iore_expires;

    gzip off;

    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy no-referrer always;

    location = /api/v2/metrics { return 404; }
    location ^~ /health/ { return 404; }
    location ^~ /internal/ { return 404; }

    location / {
        proxy_pass http://127.0.0.1:2790;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 2s;
        proxy_read_timeout 15s;
        proxy_send_timeout 15s;
        proxy_buffering on;
        proxy_buffer_size 16k;
        proxy_buffers 16 64k;
    }
}
